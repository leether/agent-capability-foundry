id: capability-creator
name: Capability Creator
version: 0.1.0
summary: Create a governed capability from intent by driving boundary, phases, constraints, gates, bilingual docs, and runtime-aware adapter planning.
maturity: incubating
supported_runtimes:
  - codex
  - openclaw
asset_kinds:
  - skill
  - workflow
  - safety
  - template
entrypoints:
  default: core/skill.md
  workflow: core/workflow.md
install_contract:
  mode: materialize
  runtime_required: true
  supports_dry_run: true
  supports_apply: true
validation_contract:
  mode: post_install_checks
  minimum_checks:
    - structural
    - runtime_materialization
    - public_safety
localization:
  source_language: en
  derived_languages:
    - zh
